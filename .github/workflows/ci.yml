name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Valide data/sauces.json (familles, filiation, accords, vocabulaire)
      # puis construit la page depuis les sources. index.html n'est pas commité :
      # c'est un artefact de build, régénéré ici et au déploiement (Cloudflare).
      # Un échec de build (données invalides, point d'injection manquant) casse la CI.
      - name: Validate and build the page
        run: node tools/build.js
