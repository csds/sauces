name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Validates data/sauces.json (families, lineage, pairings, vocabulary)
      # then builds the page from source. dist/index.html is not committed:
      # it's a build artifact, regenerated here and at deploy time (Cloudflare).
      # A build failure (invalid data, missing injection point) breaks CI.
      - name: Validate and build the page
        run: node tools/build.js
